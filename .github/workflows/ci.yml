name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  NODE_VERSION: 20
  SCANNER_LOCATION: ./crates/scanner

jobs:
  test:
    name: Test
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup WASM target
        run: rustup target add wasm32-wasip1-threads

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build scanner
        run: pnpm run build
        working-directory: ${{ env.SCANNER_LOCATION }}

      - name: Test scanner binary
        run: node -e "console.log('Scanner loaded successfully:', require('./scanner.darwin-arm64.node'))"
        working-directory: ${{ env.SCANNER_LOCATION }}

      - name: Test Rust crates
        run: cargo test
        working-directory: crates/sugarcube_scanner