name: Publish

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

env:
  NODE_VERSION: 20
  SCANNER_LOCATION: ./crates/scanner

jobs:
  build:
    strategy:
      matrix:
        include:
          # Start with just the basics that we know work
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # macOS  
          - os: macos-latest
            target: x86_64-apple-darwin
            strip: strip -x
          - os: macos-latest
            target: aarch64-apple-darwin
            strip: strip -x
          # Linux (basic)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            strip: strip

    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install gcc-arm-linux-gnueabihf
        if: ${{ matrix.target == 'armv7-unknown-linux-gnueabihf' }}
        run: |
          sudo apt-get update
          sudo apt-get install gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf -y

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust (if needed)
        if: ${{ matrix.container }}
        run: |
          if ! command -v rustup &> /dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source $HOME/.cargo/env
          fi
          rustup default stable

      - name: Setup rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build scanner
        run: pnpm run build:platform --target=${{ matrix.target }}
        working-directory: ${{ env.SCANNER_LOCATION }}
        env:
          RUST_TARGET: ${{ matrix.target }}

      - name: Strip debug symbols
        if: ${{ matrix.strip }}
        run: |
          find ${{ env.SCANNER_LOCATION }}/npm -name "*.node" -exec ${{ matrix.strip }} {} \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: ${{ env.SCANNER_LOCATION }}/npm/*/scanner.*.node
          if-no-files-found: error

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup WASM target
        run: rustup target add wasm32-wasip1-threads

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build WASM
        run: pnpm run build:wasm
        working-directory: ${{ env.SCANNER_LOCATION }}

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: |
            ${{ env.SCANNER_LOCATION }}/npm/wasm32-wasi/*
          if-no-files-found: error

  publish-preview:
    name: Publish Preview
    if: github.event_name == 'pull_request'
    needs: [build, build-wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to packages
        run: |
          cd ${{ env.SCANNER_LOCATION }}
          
          # Copy platform binaries (only if they exist)
          for artifact_dir in ../../../artifacts/bindings-*; do
            if [ -d "$artifact_dir" ]; then
              target=$(basename "$artifact_dir" | sed 's/bindings-//')
              echo "Found artifacts for: $target"
              
              case "$target" in
                x86_64-pc-windows-msvc)
                  cp "$artifact_dir"/* ./npm/win32-x64-msvc/ 2>/dev/null || echo "No files to copy for $target"
                  ;;
                x86_64-apple-darwin)
                  cp "$artifact_dir"/* ./npm/darwin-x64/ 2>/dev/null || echo "No files to copy for $target"
                  ;;
                aarch64-apple-darwin)
                  cp "$artifact_dir"/* ./npm/darwin-arm64/ 2>/dev/null || echo "No files to copy for $target"
                  ;;
                x86_64-unknown-linux-gnu)
                  cp "$artifact_dir"/* ./npm/linux-x64-gnu/ 2>/dev/null || echo "No files to copy for $target"
                  ;;
              esac
            fi
          done
          
          # Copy WASM artifacts (only if they exist)
          if [ -d "../../../artifacts/wasm-artifacts" ]; then
            cp ../../../artifacts/wasm-artifacts/* ./npm/wasm32-wasi/ 2>/dev/null || echo "No WASM files to copy"
          fi
          
          # Show what we actually have
          echo "=== Platform packages with binaries ==="
          find ./npm -name "*.node" -o -name "*.wasm" | sort

      - name: Publish preview with pkg-pr-new
        working-directory: ${{ env.SCANNER_LOCATION }}
        run: |
          pnpx pkg-pr-new publish './npm/darwin-arm64' './npm/darwin-x64' './npm/win32-x64-msvc' './npm/linux-x64-gnu' './npm/wasm32-wasi' '.' --template './npm/'

  # Disabled for now - not ready to publish to npm yet
  # publish-npm:
  #   name: Publish to NPM
  #   if: false  # Disabled
  #   needs: [build, build-wasm]
  #   runs-on: ubuntu-latest